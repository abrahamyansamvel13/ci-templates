name: Centralized Build, Scan, and Delivery

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/genesis:${{ inputs.image_tag }}

  scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/genesis:${{ inputs.image_tag }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

  update-manifest:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Consumer Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tag in Helm Values
        run: |
          sed -i 's|tag: ".*"|tag: "${{ inputs.image_tag }}"|g' genesis-chart/values.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add genesis-chart/values.yaml
          git diff-index --quiet HEAD || git commit -m "chore(gitops): bump container image tag to ${{ inputs.image_tag }}"
          git push origin ${{ github.event.pull_request.head.ref || github.ref_name }}
